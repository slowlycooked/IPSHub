server {
    listen 80;
    server_name _;

    # Compression
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml text/javascript;

    # ── Reverse proxy: API ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Reverse proxy: subscription endpoints ──────────────────────────────
    location /sub/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Subscription responses can be large; allow more time
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Reverse proxy: health check ─────────────────────────────────────────
    location /health {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── React SPA (static files + history fallback) ─────────────────────────
    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;

        # Long-lived cache for hashed assets (Vite adds content hash to filenames)
        location ~* \.(?:js|css|woff2?|ico|svg|png|jpg|jpeg|gif)$ {
            expires            1y;
            add_header         Cache-Control "public, immutable";
            access_log         off;
        }
    }
}
