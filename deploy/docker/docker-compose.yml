# ── IPSHub – Optional Docker Compose deployment ────────────────────────────
# Native macOS deployment is the primary path for this repo. For Docker/NAS,
# run from the repository root:
#   docker compose --env-file .env -f deploy/docker/docker-compose.yml up -d --build
#
# Service topology:
#   frontend  (nginx:1.27-alpine)  → port WEB_PORT:80   (default 8088:80)
#     └─ proxies /api/ /sub/ /health  to  backend:8080
#   backend   (node:22-alpine)      → internal port 8080 only

services:

  # ── Backend: Fastify / Node.js API server ──────────────────────────────────
  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      target: backend
      args:
        BUILDKIT_INLINE_CACHE: "1"
      # Disable provenance attestations — they balloon the OCI export and make
      # `docker compose build` take 10+ minutes even for small images.
      provenance: false
    container_name: ipshub-backend
    restart: unless-stopped
    entrypoint: ["/usr/bin/dumb-init", "--"]
    command: ["node", "apps/server/dist/index.js"]
    environment:
      - TZ=Asia/Shanghai
      - NODE_ENV=production
      # Public URL used to generate Clash/Loon subscription links.
      # Set this to what your NAS exposes (IP:WEB_PORT or domain).
      - APP_BASE_URL=${APP_BASE_URL}
      # REQUIRED – 32-byte hex secret for session signing.
      - APP_SECRET=${APP_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SERVER_PORT=8080
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # Set true only when the NAS is accessed over HTTPS (reverse proxy with TLS)
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      # Absolute path inside the container – matches the volume mount below
      - DB_PATH=/app/data/ipshub.db
    volumes:
      - ../../data:/app/data       # SQLite database (persistent)
      - ../../config:/app/config   # optional config overrides
    # Backend port is NOT exposed externally – frontend nginx is the entry point.
    # Uncomment the line below only if you need direct backend access for debugging:
    # ports:
    #   - "8089:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Frontend: nginx serving React SPA + reverse-proxying to backend ────────
  frontend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      target: frontend
      provenance: false
    container_name: ipshub-frontend
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8088}:80"
    depends_on:
      backend:
        condition: service_healthy
