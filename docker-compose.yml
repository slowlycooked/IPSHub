version: '3.8'

services:
  ipshub:
    build: .
    container_name: ipshub
    restart: unless-stopped
    ports:
      - "8088:8080"
    environment:
      - TZ=Asia/Shanghai
      - NODE_ENV=production
      - APP_BASE_URL=http://localhost:8088
      - APP_SECRET=55dc7581442d83e31df9e8ae953a1c86e5d7ca9aa79415af70fe29d9c240484f
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=please-change-this-password
      - SERVER_PORT=8080
      - LOG_LEVEL=info
      - COOKIE_SECURE=false
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
