version: '3.8'

services:
  ipshub:
    build: .
    container_name: ipshub
    restart: unless-stopped
    ports:
      - "8088:8080"
    environment:
      - TZ=Asia/Shanghai
      - NODE_ENV=production
      - APP_BASE_URL=http://localhost:8088
      - APP_SECRET=please-change-this-secret-in-production
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=please-change-this-password
      - DB_PATH=/app/data/ipshub.db
      - SERVER_PORT=8080
      - LOG_LEVEL=info
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
